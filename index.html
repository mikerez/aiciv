<body>
                          <!-- width="400" height="300" style="width:400px;height:300px;" -->
    <canvas id="canvas3D" width="1500" height="1000" style="touch-action: none;"></canvas>

    <button id="endTurnButton" style="position: fixed;left: 50%;top: 42px;transform: translateX(-50%);z-index: 6;background: rgba(255,255,255,0.75);border: 1px solid rgba(0,0,0,0.35);border-radius: 8px;padding: 8px 12px;font: bold 14px Arial;">End Turn</button>
    <script>
        // very global vars
//        var _redraw = 1;
        var _fulldraw = 1;
        var sqrt2 = Math.sqrt(2);

        // we dont use class members to do not always write "this." since we use only one object of any type
        const _map_size = 100;
        const _cell_width = 200;  // by X, already multiplied by sqrt2/2
        const _cell_height = 200;  // by Y, already multiplied by sqrt2/2
        const _map_view = [_map_size/2*_cell_width,-_map_size/2*_cell_height,
                           _map_size/2*3*_cell_width,_map_size/2*_cell_height];
        const _map_terrain_tex = new Array(_map_size);
        const _map_terrain_bit = new Array(_map_size);
        const _map_resource = new Array(_map_size);
        const _map_terrain_mod = new Array(_map_size);
        // not zoomed coordinates from start of the map
        function xytoi(x,y) { return (x+y)/2/*sqrt2^2*//_cell_height; }
        function xytoj(x,y) { return (x-y)/2/*sqrt2^2*//_cell_width; }  //_map_size*sqrt2/2-
        function ijtox(i,j) { return i*_cell_height+j*_cell_width; }
        function ijtoy(i,j) { return i*_cell_height-j*_cell_width; }
    </script>
    <script src="menu_unit.js?v=20260522f"></script>
    <script src="draw.js?v=20260522f"></script>
    <script src="control.js?v=20260524a"></script>
    <script src="game.js?v=20260525d"></script>
    <script src="city.js?v=20260525e"></script>
    <script src="menu_technology.js?v=20260522f"></script>
    <script src="menu_politics.js?v=20260522f"></script>
    <script src="menu_finance.js?v=20260522f"></script>
    <script src="menu_trade.js?v=20260522f"></script>
    <script src="menu_main.js?v=20260525b"></script>
    <script src="map.js?v=20260524f"></script>
    <script src="screen.js?v=20260525c"></script>
    <script>
        // X,Y - canvas backing-buffer coordinates.
        function Xtox1(X) { return X*2-_canvas.width/*/2*2*/; }
        function Ytoy1(Y) { return Y*2-_canvas.height/*/2*2*/; }
        function x1toX(x) { return (x+_canvas.width)/2/*/2*2*/; }
        function y1toY(y) { return (y+_canvas.height)/2/*/2*2*/; }
        function eventToCanvas(event) {
            const rect = _canvas.getBoundingClientRect();
            return {
                x: (event.clientX - rect.left) * _canvas.width / rect.width,
                y: (event.clientY - rect.top) * _canvas.height / rect.height,
            };
        }
        function eventToMapCoord(event) {
            const point = eventToCanvas(event);
            return new Coord(xy1toi(Xtox1(point.x), Ytoy1(point.y)), xy1toj(Xtox1(point.x), Ytoy1(point.y)));
        }

        var _canvas = document.getElementById("canvas3D");
        var _gl = _canvas.getContext("webgl", { antialias: false, alpha: false, depth: false, stencil: false, powerPreference: "low-power", preserveDrawingBuffer: true });
        const _ratio = window.devicePixelRatio;
        var _screenZoom = 2;
        var _screenOffsetX = _map_view[0]/_screenZoom+_canvas.width*2;
        var _screenOffsetY = _map_view[1]/_screenZoom-_canvas.height*2;
        // xy1 - *2 coordinates, starting from center of the screen
        function xy1toi(x,y) { return (x*_screenZoom+_screenOffsetX*2*_ratio+y*_screenZoom+_screenOffsetY*2*_ratio)/2/_cell_height; }
        function xy1toj(x,y) { return (x*_screenZoom+_screenOffsetX*2*_ratio-y*_screenZoom-_screenOffsetY*2*_ratio)/2/_cell_width; }  //_map_size*sqrt2/2-
        function ijtox1(i,j) { return (i*_cell_height + j*_cell_width - _screenOffsetX*2*_ratio)/_screenZoom; }
        function ijtoy1(i,j) { return (i*_cell_height - j*_cell_width - _screenOffsetY*2*_ratio)/_screenZoom; }

        const _textures = new Array(1024);  // first 256 are map tiles
        _screen.init();
        // [A S D1 D0 T3 T2 T1 T0], T - type 4 bit, D - depth/height/wildity, S - 4 blocks supertile of similar type, A - alternative view (+means water source exists)
        // D0 for hills means forest exists, can be removed when forest is chopped, not touching other bits
        _screen.loadTexture('waterdeep1.png', 0);
         _screen.loadTexture('water.png', 0+(1<<4));  // deep
         _screen.loadTexture('waterdeep.png', 0+(2<<4));  // deep
         _screen.loadTexture('waterdeep.png', 0+(3<<4));  // deep
//         _screen.loadTexture('water-1.png', 0+(8<<4));  // deep
//         _screen.loadTexture('water4.png', 0+(4<<4));  // deep
        _screen.loadTexture('sand.png', 1);
         _screen.loadTexture('sanddune3.png', 1+(1<<4));
         _screen.loadTexture('sand2.png', 1+(2<<4));
         _screen.loadTexture('sanddune1.png', 1+(3<<4));
         _screen.loadTexture('sandbig.png', 1+(4<<4));
         _screen.loadTexture('sanddune3.png', 1+(5<<4));
         _screen.loadTexture('sand6.png', 1+((2+4)<<4));
         _screen.loadTexture('sand10.png', 1+((2+8)<<4));
         _screen.loadTexture('sand14.png', 1+((8+2+4)<<4));
        _screen.loadTexture('grass.png', 2);
         _screen.loadTexture('grass_wet.png', 2+(1<<4));
         _screen.loadTexture('grass_offroad.png', 2+(2<<4));
         _screen.loadTexture('grass_swamps.png', 2+(3<<4));  //swamps
        _screen.loadTexture('snow.png', 3);
          _screen.loadTexture('snowhill.png', 3+(1<<4));
          _screen.loadTexture('snowhill1.png', 3+(2<<4));
          _screen.loadTexture('snowhill2.png', 3+(3<<4));
        _screen.loadTexture('hills.png', 4);
          _screen.loadTexture('hills1.png', 4+(1<<4));
          _screen.loadTexture('hills2.png', 4+(2<<4));
          _screen.loadTexture('hills3.png', 4+(3<<4));
          _screen.loadTexture('hills4.png', 4+(4<<4));
          _screen.loadTexture('hills5.png', 4+((1+4)<<4));
          _screen.loadTexture('hills6.png', 4+((2+4)<<4));
          _screen.loadTexture('hills12.png', 4+((8+4)<<4));
          _screen.loadTexture('hills13.png', 4+((8+1+4)<<4));
        _screen.loadTexture('rocks.png', 5);
          _screen.loadTexture('rocks.png', 5+(1<<4));
          _screen.loadTexture('rocks2.png', 5+(2<<4));
          _screen.loadTexture('rocks1.png', 5+(3<<4));
        _screen.loadTexture('forest.png', 6);
         _screen.loadTexture('forest1.png', 6+(1<<4));
         _screen.loadTexture('forest2.png', 6+(2<<4));
         _screen.loadTexture('forest3.png', 6+(3<<4));
         _screen.loadTexture('forest7.png', 6+(7<<4));
        _screen.loadTexture('grasswater.png', 7+(3<<4));
        _screen.loadTexture('road.png', 850);
         _screen.loadTexture('irrigation.png', 851);
        _screen.loadTexture('food.png', 860);
        _screen.loadTexture('food5.png', 861);
        _screen.loadTexture('production.png', 862);
        _screen.loadTexture('production5.png', 863);
        _screen.loadTexture('money.png', 864);
        _screen.loadTexture('money5.png', 865);
        if (typeof _city_economy !== 'undefined') {
            _city_economy.init();
        }

    </script>
    <script src="game_prehistory.js?v=20260525e"></script>
    <script>
        for (var resourceId=1; resourceId < _resource_types.length; resourceId++) {
            _screen.loadTexture(_resource_types[resourceId].sprite, _resource_types[resourceId].texture);
        }

        _map.init();
        _map.gen();

        var _shift_pressed = 0;
        var _ctrl_pressed = 0;
        var _mousedown = 0;
        var _dragging_unit_path = 0;
        var _panning_map = 0;
        var _last_pointer_point = null;
        var _step = 0;
        var _in_drawing = 0;

        setTimeout(drawScene, 700, 1);

        // select current game package
        _current_game = _game_prehistory;

        _current_game.startGame();

        var _is_mobile_browser = window.matchMedia('(pointer: coarse)').matches || /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
        if (_is_mobile_browser) {
            document.body.classList.add('mobile-ui');
        }

        function isGameInputTarget(target)
        {
            return target == _canvas || target == document.getElementById('canvas2D') || target == document.body || target == window;
        }

        function endTurn()
        {
            _current_game.makeTurn();
            _fulldraw = 1;
            drawScene(0);
        }

        document.getElementById('endTurnButton').onclick = function(event) {
            event.preventDefault();
            event.stopPropagation();
            endTurn();
        };

        function primaryInput(event)
        {
            if (event.changedTouches && event.changedTouches.length) {
                return event.changedTouches[0];
            }
            if (event.touches && event.touches.length) {
                return event.touches[0];
            }
            return event;
        }

        function handlePointerDown(event) {
            if (!isGameInputTarget(event.target)) {
                return;
            }
            event.preventDefault();
            const input = primaryInput(event);
            const point = eventToCanvas(input);
            const coord = eventToMapCoord(input);
            if (_current_game.handleMapClick(coord)) {
                _current_game.applyMenuRules();
                drawScene(0);
                return;
            }
            _control.click(Xtox1(point.x), Ytoy1(point.y));
            _current_game.applyMenuRules();
            drawScene(0);
            _mousedown = 1;
            _last_pointer_point = point;
            _dragging_unit_path = (_selection != -1 && _units[_selection].can_move) ? 1 : 0;
            _panning_map = _dragging_unit_path ? 0 : 1;
        }

        function panMapToPoint(point) {
            if (!_last_pointer_point) {
                _last_pointer_point = point;
                return;
            }
            var dx = point.x - _last_pointer_point.x;
            var dy = point.y - _last_pointer_point.y;
            _screenOffsetX -= dx*_screenZoom/(2*_ratio);
            _screenOffsetY -= dy*_screenZoom/(2*_ratio);
            _last_pointer_point = point;
            _draw.clear();
            _fulldraw = 1;
            drawScene(0);
        }

        function handlePointerMove(event) {
            if (!_mousedown && !isGameInputTarget(event.target)) {
                return;
            }
            if (!_mousedown && !(event.touches && event.touches.length)) {
                return;
            }
            event.preventDefault();
            const input = primaryInput(event);
            const point = eventToCanvas(input);
            const coord = eventToMapCoord(input);
            if (_current_game.previewMapCommand(coord)) {
                return;
            }
            if (_dragging_unit_path && _selection != -1 && _units[_selection].can_move) {
                if (_current_game.prepareManualMovement) {
                    _current_game.prepareManualMovement(_selection);
                }
                _control.drawGoto(_units[_selection].coord.i, _units[_selection].coord.j, coord.i, coord.j, _selection);
                return;
            }
            if (_panning_map) {
                panMapToPoint(point);
            }
        }

        function handlePointerUp(event) {
            if (!_mousedown && !isGameInputTarget(event.target)) {
                return;
            }
            event.preventDefault();
            _mousedown = 0;
            _dragging_unit_path = 0;
            _panning_map = 0;
            _last_pointer_point = null;
        }

        window.onmousedown = handlePointerDown;
        window.onmousemove = handlePointerMove;
        window.onmouseup = handlePointerUp;
        window.addEventListener('touchstart', handlePointerDown, { passive: false });
        window.addEventListener('touchmove', handlePointerMove, { passive: false });
        window.addEventListener('touchend', handlePointerUp, { passive: false });
        window.addEventListener('touchcancel', handlePointerUp, { passive: false });

        document.body.onkeydown = function(event) {
            if (event.shiftKey) {
                _shift_pressed = 1;
            }
            else {
                _shift_pressed = 0;
            }
            if (event.ctrlKey) {
                _ctrl_pressed = 1;
            }
            else {
                _ctrl_pressed = 0;
            }
            if (event.code === 'Enter') {
                endTurn();
            }
            if (event.code === 'KeyB') {
                _current_game.doCommand('build_city');
                _fulldraw = 1;
                drawScene(0);
            }
        };

        document.body.onkeyup = function(event) {
            if (event.shiftKey) {
                _shift_pressed = 1;
            }
            else {
                _shift_pressed = 0;
            }
            if (event.ctrlKey) {
                _ctrl_pressed = 1;
            }
            else {
                _ctrl_pressed = 0;
            }

        };

        window.onscroll = function(event) {
//            _redraw = 1;
//           setTimeout(drawScene, 100);
        }

        function checkScrollTimeout(X, Y)
        {
            if (_screenOffsetX == X && _screenOffsetY == Y) {
                _scroll_step = 4;
            }
        }

        var _scroll_step = 4;
        document.addEventListener("wheel", (event) => {
          event.preventDefault();
          event.stopPropagation();
          _draw.clear();

          if (_ctrl_pressed) {
              _screenZoom -= event.deltaY>0?-0.2:0.2;
              if (_screenZoom < 1) {
                  _screenZoom = 1;
              }
              if (_screenZoom > 5) {
                  _screenZoom = 5;
              }
              _fulldraw = 1;
//              _redraw = 1;
          }
          else
          for (var k=0; k<_scroll_step; ++k) {
              if (!_shift_pressed) {
                  _screenOffsetY -= event.deltaY>0?-_screenZoom/5:_screenZoom/5;
              }
              else {
                  _screenOffsetX -= event.deltaY>0?-_screenZoom/5:_screenZoom/5;
              }
              _fulldraw = 1;
//              _redraw = 1;
              if (!_in_drawing) {
                  setTimeout(drawScene, 0, 0);
              }
          }
                  setTimeout(drawScene, 0, 0);

//drawScene(0);
          _scroll_step = _scroll_step>128?_scroll_step:_scroll_step*2;
          setTimeout(checkScrollTimeout, 500, _screenOffsetX, _screenOffsetY);
          // now define custom functionality
        }, { passive: false });

    </script>
</body>
